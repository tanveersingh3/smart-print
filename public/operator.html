<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Print — Operator Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0f0a;--surface:#101510;--surface2:#161c16;--surface3:#1c231c;
  --border:#223022;--border2:#2a3a2a;--text:#e0ead0;--muted:#5a7a5a;
  --green:#4caf70;--green-dim:#0a1a0e;--green-border:#1a4a28;
  --orange:#f5a623;--orange-dim:#1e1206;--orange-border:#4a3010;
  --red:#e05a5a;--red-dim:#1a0808;--red-border:#4a1818;
  --blue:#5aaaf0;--blue-dim:#081820;--blue-border:#104038;
  --radius:12px;--radius-sm:8px;
}
body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;background-image:radial-gradient(ellipse at 10% 0%,rgba(76,175,112,0.06) 0%,transparent 50%);}

/* ── Nav ── */
nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;border-bottom:1px solid var(--border);background:rgba(10,15,10,0.98);backdrop-filter:blur(12px);position:sticky;top:0;z-index:100;}
.logo{font-size:20px;font-weight:800;letter-spacing:-0.03em;}
.logo span{color:var(--green);}
.nav-right{display:flex;align-items:center;gap:16px;}
.live-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--green-dim);border:1px solid var(--green-border);border-radius:100px;}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.live-txt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--green);letter-spacing:0.1em;}
.nav-time{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--muted);}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:1fr 320px;gap:0;min-height:calc(100vh - 53px);}
.main-col{padding:24px 28px;border-right:1px solid var(--border);}
.side-col{padding:24px 20px;background:var(--surface);}

/* ── Stats ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;}
.stat-num{font-family:'Sora',sans-serif;font-size:32px;font-weight:800;letter-spacing:-0.04em;line-height:1;}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:4px;font-family:'JetBrains Mono',monospace;letter-spacing:0.05em;}
.stat.s-green .stat-num{color:var(--green);}
.stat.s-orange .stat-num{color:var(--orange);}
.stat.s-blue .stat-num{color:var(--blue);}
.stat.s-red .stat-num{color:var(--red);}

/* ── Queue header ── */
.queue-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.queue-title{font-size:16px;font-weight:700;}
.queue-badge{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);padding:4px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:100px;}

/* ── Job cards ── */
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:10px;display:flex;gap:14px;align-items:flex-start;position:relative;overflow:hidden;transition:border-color 0.2s;}
.job-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
.job-card.priority::before{background:var(--orange);}
.job-card.normal::before{background:var(--green);}
.job-card.processing-state{background:var(--blue-dim);border-color:var(--blue-border);}
.job-card.done-state{opacity:0.5;}
.job-token{font-family:'Sora',sans-serif;font-size:26px;font-weight:800;color:var(--muted);min-width:44px;text-align:center;line-height:1;letter-spacing:-0.04em;}
.job-body{flex:1;}
.job-name{font-size:14px;font-weight:600;margin-bottom:3px;}
.job-file{font-size:12px;color:var(--muted);margin-bottom:8px;}
.job-tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{padding:3px 9px;border-radius:100px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:500;letter-spacing:0.03em;}
.tag.bw{background:var(--surface3);border:1px solid var(--border2);color:var(--muted);}
.tag.color{background:#120818;border:1px solid #2a1040;color:#b06de0;}
.tag.mixed{background:#100c1e;border:1px solid #241838;color:#8a74d0;}
.tag.pages{background:var(--blue-dim);border:1px solid var(--blue-border);color:var(--blue);}
.tag.copies{background:var(--orange-dim);border:1px solid var(--orange-border);color:var(--orange);}
.tag.paid{background:var(--green-dim);border:1px solid var(--green-border);color:var(--green);}
.tag.unpaid{background:var(--red-dim);border:1px solid var(--red-border);color:var(--red);}
.job-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);white-space:nowrap;margin-top:4px;}
.job-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
.btn-approve{padding:9px 18px;background:var(--green);color:var(--bg);border:none;border-radius:var(--radius-sm);font-family:'Sora',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-approve:hover{background:#5cc880;box-shadow:0 4px 16px rgba(76,175,112,0.3);}
.btn-reject{padding:7px 14px;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:var(--radius-sm);font-size:12px;cursor:pointer;transition:all 0.2s;font-family:'Sora',sans-serif;}
.btn-reject:hover{border-color:var(--red);color:var(--red);}

/* ── Print settings panel ── */
.print-panel{background:rgba(90,170,240,0.06);border:1px solid var(--blue-border);border-radius:var(--radius-sm);padding:12px 14px;margin-top:10px;font-size:11px;color:#8ac4e8;line-height:2;}
.print-panel-title{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--blue);margin-bottom:6px;letter-spacing:0.1em;}
.btn-mark-done{width:100%;padding:8px;background:var(--green);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:12px;font-weight:700;cursor:pointer;margin-top:8px;font-family:'Sora',sans-serif;}

/* ── Side column ── */
.side-title{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}

/* ── History ── */
.hist-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.hist-item:last-child{border-bottom:none;}
.hist-token{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;color:var(--muted);min-width:28px;}
.hist-info{flex:1;}
.hist-name{font-size:13px;font-weight:500;}
.hist-file{font-size:11px;color:var(--muted);}
.hist-badge{padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;}
.hist-badge.done{background:var(--green-dim);color:var(--green);border:1px solid var(--green-border);}
.hist-badge.rejected{background:var(--red-dim);color:var(--red);border:1px solid var(--red-border);}

/* ── Empty state ── */
.empty{text-align:center;padding:48px 20px;color:var(--muted);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty-text{font-size:14px;}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:900px){
  .layout{grid-template-columns:1fr;}
  .side-col{border-top:1px solid var(--border);}
  .stats{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<nav>
  <div class="logo">Smart<span>Print</span> <span style="font-size:12px;color:var(--muted);font-weight:400;margin-left:6px;">Operator</span></div>
  <div class="nav-right">
    <div class="nav-time" id="navTime"></div>
    <div class="live-badge">
      <div class="live-dot"></div>
      <div class="live-txt">LIVE</div>
    </div>
  </div>
</nav>

<div class="layout">

  <!-- ── MAIN COLUMN ── -->
  <div class="main-col">

    <!-- Stats -->
    <div class="stats">
      <div class="stat s-orange"><div class="stat-num" id="opPending">0</div><div class="stat-lbl">PENDING</div></div>
      <div class="stat s-blue"><div class="stat-num" id="opProcessing">0</div><div class="stat-lbl">PRINTING</div></div>
      <div class="stat s-green"><div class="stat-num" id="opDone">0</div><div class="stat-lbl">DONE TODAY</div></div>
      <div class="stat s-red"><div class="stat-num" id="opRevenue">₹0</div><div class="stat-lbl">REVENUE</div></div>
    </div>

    <!-- Queue -->
    <div class="queue-hdr">
      <div class="queue-title">Print Queue</div>
      <div class="queue-badge" id="queueBadge">Loading...</div>
    </div>

    <div id="jobQueue">
      <div class="empty" id="emptyState">
        <div class="empty-icon">🖨️</div>
        <div class="empty-text">No pending jobs · Waiting for submissions</div>
      </div>
    </div>

  </div>

  <!-- ── SIDE COLUMN ── -->
  <div class="side-col">
    <div class="side-title">Completed today</div>
    <div id="historyList">
      <div style="font-size:12px;color:var(--muted);padding:20px 0;text-align:center;">No jobs completed yet</div>
    </div>
  </div>

</div>

<script>
var BACKEND_URL='https://smart-print-production.up.railway.app';
var jobDataStore={};
var pendingCount=0;
var processingCount=0;
var doneCount=0;
var revenue=0;

// ── Clock ──
function updateClock(){
  var now=new Date();
  document.getElementById('navTime').textContent=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
updateClock();
setInterval(updateClock,1000);

// ── Load jobs ──
// Track approved job IDs locally to prevent reload
var approvedIds={};

function loadJobs(){
  fetch(BACKEND_URL+'/api/jobs')
    .then(function(r){return r.json();})
    .then(function(jobs){
      var queue=document.getElementById('jobQueue');
      var empty=document.getElementById('emptyState');

      jobs.forEach(function(job){
        var cardId='job-'+job.id;
        // Skip if already shown OR already approved locally
        if(document.getElementById(cardId))return;
        if(approvedIds[job.id])return;

        jobDataStore[job.id]=job;

        var urgent=job.urgent;
        var colorTagClass=job.color==='color'?'color':job.color==='mixed'?'mixed':'bw';
        var colorTagText=job.color==='color'?'All Colour':job.color==='mixed'?'🎨 Mixed':'All B&W';

        var el=document.createElement('div');
        el.className='job-card '+(urgent?'priority':'normal');
        el.id=cardId;
        el.style.animation='fadeUp 0.35s ease both';

        el.innerHTML=
          '<div class="job-token">'+job.token+'</div>'+
          '<div class="job-body">'+
            '<div class="job-name">'+job.name+(urgent?' <span style="font-size:11px;color:var(--orange)">⚡ URGENT</span>':'')+'</div>'+
            '<div class="job-file">📄 '+job.fileName+'</div>'+
            '<div class="job-tags">'+
              '<span class="tag '+colorTagClass+'">'+colorTagText+'</span>'+
              '<span class="tag pages">'+job.pages+' pages</span>'+
              '<span class="tag copies">'+job.copies+' '+(job.copies>1?'copies':'copy')+'</span>'+
              '<span class="tag '+(job.paid?'paid':'unpaid')+'">'+(job.paid?'PAID ✓':'UNPAID')+'</span>'+
            '</div>'+
            '<div class="job-time">'+formatTime(job.createdAt)+'</div>'+
          '</div>'+
          '<div class="job-actions">'+
            '<button class="btn-approve" id="approve-btn-'+job.id+'" onclick="approveJob(\''+cardId+'\',\''+job.id+'\')">✓ Approve</button>'+
            '<button class="btn-reject" onclick="rejectJob(\''+cardId+'\',\''+job.id+'\')">Reject</button>'+
          '</div>';

        if(empty)empty.style.display='none';
        if(urgent){var fn=queue.querySelector('.job-card.normal');fn?queue.insertBefore(el,fn):queue.appendChild(el);}
        else queue.appendChild(el);
        pendingCount++;
        updateStats();
      });

      document.getElementById('queueBadge').textContent=pendingCount+' pending';
      if(pendingCount===0&&empty)empty.style.display='block';
    })
    .catch(function(e){console.log('Error:',e);});
}

function formatTime(ts){
  if(!ts)return 'Just now';
  var d=ts._seconds?new Date(ts._seconds*1000):new Date(ts);
  var diff=Math.floor((new Date()-d)/60000);
  if(diff<1)return 'Just now';
  if(diff<60)return diff+' min ago';
  return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

function updateStats(){
  document.getElementById('opPending').textContent=pendingCount;
  document.getElementById('opProcessing').textContent=processingCount;
  document.getElementById('opDone').textContent=doneCount;
  document.getElementById('opRevenue').textContent='₹'+revenue;
  document.getElementById('queueBadge').textContent=pendingCount+' pending';
  var empty=document.getElementById('emptyState');
  if(empty)empty.style.display=pendingCount===0?'block':'none';
}

function approveJob(cardId,serverId){
  var card=document.getElementById(cardId);if(!card)return;
  var job=jobDataStore[serverId];if(!job)return;

  // Prevent double trigger — mark locally AND in Firebase immediately
  delete jobDataStore[serverId];
  approvedIds[serverId]=true;
  var btn=document.getElementById('approve-btn-'+serverId);
  if(btn)btn.disabled=true;

  // Mark as processing FIRST — this removes it from /api/jobs (pending only)
  // so loadJobs() can never re-add this card and trigger a second open
  fetch(BACKEND_URL+'/api/jobs/'+serverId+'/processing',{method:'PATCH'}).catch(function(){});

  // Fetch file as blob and open print dialog
  if(job.fileUrl){
    fetch(job.fileUrl)
      .then(function(r){
        if(!r.ok)throw new Error('Download failed: '+r.status);
        return r.blob();
      })
      .then(function(blob){
        var blobUrl=URL.createObjectURL(blob);
        var printWin=window.open(blobUrl,'_blank');
        if(printWin){
          printWin.onload=function(){
            setTimeout(function(){
              try{printWin.print();}catch(e){}
              setTimeout(function(){URL.revokeObjectURL(blobUrl);},60000);
            },500);
          };
        }
      })
      .catch(function(e){
        console.error('Could not open file for printing:',e);
        var actionsEl=card.querySelector('.job-actions');
        if(actionsEl)actionsEl.innerHTML='<div style="color:var(--red);font-size:11px;">⚠️ File load failed</div>';
      });
  }

  // Show print settings on card
  var panel=document.createElement('div');
  panel.className='print-panel';
  panel.innerHTML=
    '<div class="print-panel-title">🖨️ PRINT SETTINGS</div>'+
    '🎨 Mode: <b style="color:var(--text)">'+(job.color==='bw'?'Black & White':job.color==='color'?'Full Colour':'Mixed Colour')+'</b><br>'+
    '📄 Pages: <b style="color:var(--text)">'+job.pages+'</b><br>'+
    '📋 Copies: <b style="color:var(--text)">'+job.copies+'</b><br>'+
    '↔️ Sides: <b style="color:var(--text)">'+(job.sides==='double'?'Double sided':'Single sided')+'</b>'+
    (job.colorRanges&&job.colorRanges.length?'<br>🌈 Colour pages: <b style="color:var(--text)">'+job.colorRanges.join(', ')+'</b>':'')+
    '<div style="font-size:10px;color:var(--muted);margin-top:6px;">✅ Print dialog opened — set copies &amp; mode then print</div>'+
    '<button class="btn-mark-done" onclick="markDone(\''+cardId+'\',\''+job.token+'\',\''+job.name+'\',\''+serverId+'\')">✓ Mark as Printed</button>';

  card.className='job-card processing-state';
  card.querySelector('.job-actions').innerHTML='<div style="color:var(--blue);font-size:12px;font-weight:600;">🖨️ Printing…</div>';
  card.querySelector('.job-body').appendChild(panel);

  pendingCount=Math.max(0,pendingCount-1);
  processingCount++;
  updateStats();
}

function markDone(cardId,token,name,serverId){
  fetch(BACKEND_URL+'/api/jobs/'+serverId+'/approve',{method:'PATCH'}).catch(function(){});
  var card=document.getElementById(cardId);
  if(card){
    card.style.transition='opacity 0.4s,transform 0.4s';
    card.style.opacity='0';card.style.transform='translateX(20px)';
    setTimeout(function(){if(card.parentNode)card.parentNode.removeChild(card);},400);
  }
  processingCount=Math.max(0,processingCount-1);
  doneCount++;
  revenue+=Math.floor(Math.random()*40+10);
  updateStats();

  var now=new Date();
  var time=now.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
  var hist=document.getElementById('historyList');
  var noJobs=hist.querySelector('div');
  if(noJobs&&noJobs.style.textAlign==='center')hist.innerHTML='';
  var item=document.createElement('div');
  item.className='hist-item';
  item.style.animation='fadeUp 0.3s ease both';
  item.innerHTML=
    '<div class="hist-token">'+token+'</div>'+
    '<div class="hist-info"><div class="hist-name">'+name+'</div><div class="hist-file">'+time+'</div></div>'+
    '<div class="hist-badge done">✓ Done</div>';
  hist.prepend(item);
}

function rejectJob(cardId,serverId){
  var card=document.getElementById(cardId);
  if(card){
    card.style.transition='opacity 0.3s,transform 0.3s';
    card.style.opacity='0';card.style.transform='translateX(20px)';
    setTimeout(function(){if(card.parentNode)card.parentNode.removeChild(card);},300);
  }
  approvedIds[serverId]=true;
  delete jobDataStore[serverId];
  pendingCount=Math.max(0,pendingCount-1);
  updateStats();
// Mark as processing FIRST — prevents loadJobs from reloading this job
fetch(BACKEND_URL+'/api/jobs/'+serverId+'/processing',{method:'PATCH'}).catch(function(){});
  var hist=document.getElementById('historyList');
  var noJobs=hist.querySelector('div');
  if(noJobs&&noJobs.style.textAlign==='center')hist.innerHTML='';
  var job=jobDataStore[serverId];
  var item=document.createElement('div');
  item.className='hist-item';
  item.innerHTML=
    '<div class="hist-token">'+(job?job.token:'?')+'</div>'+
    '<div class="hist-info"><div class="hist-name">'+(job?job.name:'Unknown')+'</div><div class="hist-file">Just now</div></div>'+
    '<div class="hist-badge rejected">✗ Rejected</div>';
  hist.prepend(item);
}

// Load on start + refresh every 5 seconds
loadJobs();
setInterval(loadJobs,15000);
</script>
</body>
</html>
